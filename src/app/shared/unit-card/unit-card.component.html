<div class="location-card h-100">
  <div class="card-header-custom">
    <div class="location-badge">
      <i class="fas {{ headerIcon }}" aria-hidden="true"></i>
    </div>
    <div>
      <h4 class="location-title">{{ unit.name }}</h4>
      <p class="location-subtitle" *ngIf="showSubtitle">{{ unit.subtitle }}</p>
    </div>
  </div>
  <div class="card-body-custom">
    <div class="location-details">
      <div class="detail-item">
        <div class="detail-icon">
          <i class="fas fa-map-marker-alt" aria-hidden="true"></i>
        </div>
        <div class="detail-content">
          <h6>Endereço</h6>
          <p>{{ unit.neighborhood }}, {{ unit.addressLine }}</p>
        </div>
      </div>

      <div class="detail-item" *ngIf="showHours">
        <div class="detail-icon">
          <i class="fas fa-clock" aria-hidden="true"></i>
        </div>
        <div class="detail-content">
          <h6>Horário</h6>
          <p>{{ unit.hours[0] }}<br>{{ unit.hours[1] }}</p>
        </div>
      </div>

      <div class="detail-item">
        <div class="detail-icon">
          <i class="fab fa-whatsapp" aria-hidden="true"></i>
        </div>
        <div class="detail-content">
          <h6>WhatsApp</h6>
          <p><a [href]="unit.whatsappLink" class="contact-link" appTrackClick="generate_lead"
                [analyticsParams]="{ event_category: 'lead', event_label: 'WhatsApp ' + unit.name, contact_method: 'whatsapp', location: unit.key, page_section: analyticsSection }">{{ unit.whatsappNumber }}</a></p>
        </div>
      </div>

      <div class="detail-item" *ngIf="showEmail">
        <div class="detail-icon">
          <i class="fas fa-envelope" aria-hidden="true"></i>
        </div>
        <div class="detail-content">
          <h6>E-mail</h6>
          <p><a [href]="'mailto:' + unit.email" class="contact-link" appTrackClick="generate_lead"
                [analyticsParams]="{ event_category: 'lead', event_label: 'E-mail ' + unit.name, contact_method: 'email', location: unit.key, page_section: analyticsSection }">{{ unit.email }}</a></p>
        </div>
      </div>
    </div>

    <div class="map-wrapper" *ngIf="showMap">
      <iframe
        [src]="safeMapUrl"
        width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
  </div>
</div>
