<div class="hero-section">
  <div class="container">
    <div class="row align-items-center min-vh-40">
      <div class="col-lg-6">
        <h1 class="display-4 fw-bold text-white mb-4">{{ title }}</h1>
        <p class="lead text-white-50 mb-4">{{ subtitle }}</p>
        <ng-content select="[hero-actions]"></ng-content>
      </div>
      <div class="col-lg-6">
        <div class="hero-image text-center">
          <i class="fas {{ icon }} fa-10x text-white opacity-25" aria-hidden="true"></i>
        </div>
      </div>
    </div>
  </div>
</div>
