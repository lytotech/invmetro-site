<section class="cta-section" [class.cta-section--light]="variant === 'light'">
  <div class="container">
    <div class="row">
      <div class="col-12 text-center">
        <h3 class="cta-title">{{ title }}</h3>
        <p class="cta-subtitle">{{ subtitle }}</p>
        <div class="cta-buttons">
          <ng-content></ng-content>
        </div>
      </div>
    </div>
  </div>
</section>
