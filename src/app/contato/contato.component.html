<!-- Hero Section -->
<inv-hero title="Entre em Contato" subtitle="Estamos prontos para atender você nas nossas duas unidades em Curitiba e Campo Largo." icon="fa-comments">
  <div hero-actions class="d-flex gap-3">
    <button (click)="scrollToSection('localizacao')" class="btn btn-light" appTrackClick="select_content"
            [analyticsParams]="{ event_category: 'cta', event_label: 'Localização', content_type: 'section_scroll', page_section: 'contato_hero' }">
      <i class="fas fa-map-marker-alt me-2" aria-hidden="true"></i>Ver Unidades e Endereços
    </button>
    <a href="https://api.whatsapp.com/send?phone=554133573939" target="_blank" class="btn btn-outline-light" appTrackClick="generate_lead"
       [analyticsParams]="{ event_category: 'lead', event_label: 'WhatsApp Contato Hero', contact_method: 'whatsapp', location: 'curitiba', page_section: 'contato_hero' }">
      <i class="fab fa-whatsapp me-2" aria-hidden="true"></i>Falar Agora no WhatsApp
    </a>
  </div>
</inv-hero>

<!-- Localização -->
<section id="localizacao" class="py-4 bg-light">
  <div class="container">
    <div class="row">
      <inv-section-header [compact]="true" title="Nossas Unidades" subtitle="Visite uma de nossas unidades para atendimento presencial"></inv-section-header>
    </div>

    <div class="row g-4">
      <div class="col-lg-6" *ngFor="let unit of units">
        <inv-unit-card [unit]="unit" analyticsSection="contato_localizacao"></inv-unit-card>
      </div>
    </div>
  </div>
</section>
