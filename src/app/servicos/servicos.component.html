<!-- Hero Section -->
<div class="hero-section">
  <div class="container">
    <div class="hero-content">
      <h1 class="hero-title">Nossos Serviços</h1>
      <p class="hero-subtitle">Soluções completas em inspeção veicular com qualidade e confiabilidade</p>
      <div class="hero-buttons">
        <button (click)="scrollToSection('servicos')" class="btn btn-light" appTrackClick="select_content"
                [analyticsParams]="{ event_category: 'cta', event_label: 'Ver Serviços', content_type: 'section_scroll', page_section: 'servicos_hero' }">
          <i class="fas fa-list me-2" aria-hidden="true"></i>Ver Serviços
        </button>
        <button (click)="scrollToSection('precos')" class="btn btn-outline-light" appTrackClick="select_content"
                [analyticsParams]="{ event_category: 'cta', event_label: 'Consultar Preços', content_type: 'section_scroll', page_section: 'servicos_hero' }">
          <i class="fas fa-calculator me-2" aria-hidden="true"></i>Consultar Preços
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Services Section -->
<section id="servicos" class="services-section">
  <div class="container">
    <div class="row">
      <inv-section-header styleVariant="plain" title="O Que Oferecemos" subtitle="Conheça todos os tipos de inspeção veicular que oferecemos"></inv-section-header>
    </div>

    <!-- Categorias de serviços -->
    <div class="service-category" *ngFor="let category of categories">
      <h3 class="category-title"><i class="fas {{ category.icon }}" aria-hidden="true"></i> {{ category.name }}</h3>
      <div class="row g-4">
        <div [class]="service.featured ? 'col-lg-12 mb-4' : 'col-lg-6 col-md-6 mb-4'" *ngFor="let service of category.services">
          <inv-service-card [service]="service"></inv-service-card>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Pricing Section -->
<section id="precos" class="pricing-section">
  <div class="container">
    <div class="row">
      <inv-section-header styleVariant="plain" title="Tabela de Preços" subtitle="Consulte os valores dos nossos serviços por unidade"></inv-section-header>
    </div>

    <div class="row">
      <div class="col-12">
        <div class="pricing-navigation">
          <div class="nav nav-pills nav-justified" id="pricing-tabs" role="tablist">
            <button class="nav-link active" id="curitiba-tab" data-bs-toggle="pill" data-bs-target="#curitiba"
                    type="button" role="tab" aria-controls="curitiba" aria-selected="true" appTrackClick="view_item"
                    [analyticsParams]="{ event_category: 'pricing', event_label: 'Tabela Curitiba', item_name: 'precos_curitiba', location: 'curitiba' }">
              <i class="fas fa-building me-2" aria-hidden="true"></i>
              Curitiba
            </button>
            <button class="nav-link" id="campo-largo-tab" data-bs-toggle="pill" data-bs-target="#campo-largo"
                    type="button" role="tab" aria-controls="campo-largo" aria-selected="false" appTrackClick="view_item"
                    [analyticsParams]="{ event_category: 'pricing', event_label: 'Tabela Campo Largo', item_name: 'precos_campo_largo', location: 'campo_largo' }">
              <i class="fas fa-building me-2" aria-hidden="true"></i>
              Campo Largo
            </button>
          </div>
        </div>

        <div class="tab-content pricing-content" id="pricing-content">
          <div class="tab-pane fade show active" id="curitiba" role="tabpanel" aria-labelledby="curitiba-tab">
            <div class="pricing-card">
              <app-table-curitiba></app-table-curitiba>
            </div>
          </div>
          <div class="tab-pane fade" id="campo-largo" role="tabpanel" aria-labelledby="campo-largo-tab">
            <div class="pricing-card">
              <app-table-campo-largo></app-table-campo-largo>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- CTA Section -->
<inv-cta title="Precisa de mais informações?" subtitle="Entre em contato conosco para esclarecimentos sobre nossos serviços">
  <a href="https://api.whatsapp.com/send?phone=554133573939" class="btn btn-light btn-lg" appTrackClick="generate_lead"
     [analyticsParams]="{ event_category: 'lead', event_label: 'WhatsApp Serviços', contact_method: 'whatsapp', location: 'curitiba', page_section: 'servicos_cta' }">
    <i class="fab fa-whatsapp me-2" aria-hidden="true"></i>Tirar Dúvida no WhatsApp
  </a>
  <a routerLink="/contato" class="btn btn-outline-light btn-lg" appTrackClick="select_content"
     [analyticsParams]="{ event_category: 'cta', event_label: 'Contato Serviços', content_type: 'internal_cta', page_section: 'servicos_cta' }">
    <i class="fas fa-phone me-2" aria-hidden="true"></i>Falar Sobre um Serviço
  </a>
</inv-cta>
