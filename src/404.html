<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Invmetro - Inspeção Veicular</title>
  <script type="text/javascript">
    // GitHub Pages SPA fallback: redirect the deep-link path to "/" encoded as a
    // query string, so index.html's restore script can rebuild the real path
    // before the Angular router reads it.
    var pathSegmentsToKeep = 0;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
